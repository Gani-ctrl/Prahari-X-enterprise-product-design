# Render Blueprint for the PRAHARI X API (Express + Prisma).
# Docs: https://render.com/docs/blueprint-spec
#
# Usage: in the Render dashboard, "New +" -> "Blueprint", point it at this
# repo. Render reads this file and provisions the service below. Every
# envVar marked `sync: false` must be filled in manually in the Render
# dashboard after the blueprint is created (secrets are never committed).
#
# If you deploy to Railway instead, this file isn't used — Railway builds
# from server/package.json directly. Just set the same env vars in the
# Railway dashboard and set the service's root directory to "server".

services:
  - type: web
    name: prahari-x-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install && npm run build
    # prisma migrate deploy applies any pending migrations before every
    # deploy — safe to run on every deploy since already-applied migrations
    # are skipped. package.json's "start" script also runs it as a second
    # safety net (relevant on platforms without a preDeployCommand hook).
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # Neon pooled connection string, e.g. postgresql://user:pass@ep-xxx-pooler.region.aws.neon.tech/prahari_x?sslmode=require
      - key: JWT_ACCESS_SECRET
        sync: false # long random string — generate with `openssl rand -base64 48`
      - key: JWT_REFRESH_SECRET
        sync: false # a DIFFERENT long random string from JWT_ACCESS_SECRET
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: JWT_REFRESH_TTL_SHORT
        value: 1d
      - key: CLIENT_ORIGIN
        sync: false # your Vercel domain(s), comma-separated, e.g. https://prahari-x.vercel.app
      - key: PORT
        value: "4000"
      - key: NODE_VERSION
        value: 20.18.0
      # Optional — only needed if you want real emails instead of the
      # console-log fallback for verification/reset codes.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
